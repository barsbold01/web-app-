<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>International Exam Guide</title>

  <!-- Gilroy via Fontshare (closest free CDN alternative) — fallback stack -->
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,600,500,400&display=swap" rel="stylesheet" />

  <!-- We embed Gilroy as a Google Fonts workaround using Nunito as the closest match,
       then override with @font-face from a CDN that hosts Gilroy -->
  <style>
    /* ──────────────────────────────────────────
       Gilroy via CDN (bunny fonts hosts it)
    ────────────────────────────────────────── */
    @import url('https://fonts.bunny.net/css?family=nunito:400,500,600,700,800,900&display=swap');

    /* Gilroy self-host shim — bunny.net hosts it as "gilroy" */
    @font-face {
      font-family: 'Gilroy';
      src: url('https://fonts.bunny.net/gilroy/files/gilroy-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gilroy';
      src: url('https://fonts.bunny.net/gilroy/files/gilroy-medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gilroy';
      src: url('https://fonts.bunny.net/gilroy/files/gilroy-semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gilroy';
      src: url('https://fonts.bunny.net/gilroy/files/gilroy-bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gilroy';
      src: url('https://fonts.bunny.net/gilroy/files/gilroy-extrabold.woff2') format('woff2');
      font-weight: 800;
      font-style: normal;
    }

    /* ──────────────────────────────────────────
       CSS Variables
    ────────────────────────────────────────── */
    :root {
      --font: 'Gilroy', 'Nunito', sans-serif;
      --bg: #f8f9fc;
      --white: #ffffff;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --indigo-700: #4338ca;
      --indigo-600: #4f46e5;
      --indigo-500: #6366f1;
      --indigo-400: #818cf8;
      --indigo-100: #e0e7ff;
      --indigo-50: #eef2ff;
      --green-100: #dcfce7;
      --green-700: #15803d;
      --green-500: #22c55e;
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-600: #d97706;
      --amber-700: #b45309;
      --amber-800: #92400e;
      --purple-500: #a855f7;
      --red-500: #ef4444;
      --radius-xl: 1rem;
      --radius-2xl: 1.25rem;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }

    /* ──────────────────────────────────────────
       Reset & Base
    ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--slate-700);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; }
    button { cursor: pointer; font-family: var(--font); border: none; background: none; }
    ul { list-style: none; }

    /* ──────────────────────────────────────────
       Layout
    ────────────────────────────────────────── */
    .layout { padding: 1.5rem; max-width: 80rem; margin: 0 auto; }

    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--slate-900);
      margin-bottom: .2rem;
    }
    .page-header p {
      font-size: .875rem;
      color: var(--slate-500);
    }

    .content-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    @media (min-width: 1024px) {
      .content-grid { flex-direction: row; }
    }

    /* ──────────────────────────────────────────
       Left Panel
    ────────────────────────────────────────── */
    .left-panel { flex-shrink: 0; }
    @media (min-width: 1024px) { .left-panel { width: 16rem; } }

    .card {
      background: var(--white);
      border-radius: var(--radius-2xl);
      border: 1px solid var(--slate-100);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .card-label {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--slate-100);
      background: var(--slate-50);
      font-size: .75rem;
      font-weight: 700;
      color: var(--slate-600);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .exam-list { padding: .5rem; }

    .exam-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem;
      border-radius: var(--radius-xl);
      text-align: left;
      transition: background .15s, color .15s;
      margin-bottom: .25rem;
      color: var(--slate-600);
    }
    .exam-btn:hover { background: var(--slate-50); }
    .exam-btn.active { background: var(--indigo-50); color: var(--indigo-700); }

    .exam-icon-wrap {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .exam-btn-name {
      font-size: .875rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .exam-btn.active .exam-btn-name { font-weight: 700; }

    .exam-btn-desc {
      font-size: .7rem;
      color: var(--slate-400);
      margin-top: .1rem;
    }

    .chevron {
      margin-left: auto;
      width: .875rem;
      height: .875rem;
      color: var(--indigo-400);
      flex-shrink: 0;
    }

    /* Quick facts */
    .quick-facts { padding: 1rem; margin-top: 1rem; }
    .quick-facts h4 {
      font-size: .875rem;
      font-weight: 700;
      color: var(--slate-700);
      margin-bottom: .75rem;
    }
    .fact-item {
      display: flex;
      align-items: flex-start;
      gap: .625rem;
      margin-bottom: .625rem;
    }
    .fact-icon {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: .5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .fact-label {
      font-size: .65rem;
      color: var(--slate-400);
      margin-bottom: .1rem;
    }
    .fact-value {
      font-size: .8rem;
      font-weight: 600;
      color: var(--slate-800);
    }

    /* ──────────────────────────────────────────
       Right Panel
    ────────────────────────────────────────── */
    .right-panel { flex: 1; min-width: 0; }

    /* Exam header banner */
    .exam-banner {
      border-radius: var(--radius-2xl);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      border: 1px solid transparent;
    }
    .exam-banner-inner { display: flex; align-items: flex-start; gap: 1rem; }
    .exam-banner-emoji {
      width: 4rem;
      height: 4rem;
      border-radius: 1rem;
      background: var(--white);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.25rem;
      flex-shrink: 0;
    }
    .exam-banner-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--slate-900);
      margin-bottom: .2rem;
    }
    .exam-banner-sub {
      font-size: .875rem;
      color: var(--slate-600);
      margin-bottom: .5rem;
    }
    .exam-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
    .exam-tag {
      padding: .2rem .625rem;
      background: rgba(255,255,255,.8);
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: .25rem;
      background: var(--slate-100);
      border-radius: .75rem;
      padding: .25rem;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      flex: 1;
      padding: .5rem;
      border-radius: .625rem;
      font-size: .8rem;
      font-weight: 600;
      color: var(--slate-500);
      transition: background .15s, color .15s, box-shadow .15s;
    }
    .tab-btn:hover { color: var(--slate-700); }
    .tab-btn.active {
      background: var(--white);
      color: var(--slate-900);
      box-shadow: var(--shadow-sm);
    }

    /* Tab pane */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Inner cards */
    .inner-card {
      background: var(--white);
      border-radius: var(--radius-2xl);
      border: 1px solid var(--slate-100);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .inner-card:last-child { margin-bottom: 0; }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--slate-900);
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .section-title svg { flex-shrink: 0; }

    /* Overview text */
    .overview-text {
      font-size: .9rem;
      color: var(--slate-600);
      line-height: 1.7;
    }

    /* Score bars */
    .score-row { margin-bottom: .75rem; }
    .score-row:last-child { margin-bottom: 0; }
    .score-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: .25rem;
    }
    .score-label {
      font-size: .875rem;
      font-weight: 600;
      color: var(--slate-700);
      text-transform: capitalize;
    }
    .score-val {
      font-size: .875rem;
      font-weight: 700;
    }
    .score-bar-bg {
      height: .5rem;
      background: var(--slate-100);
      border-radius: 999px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
    }

    /* Tips list */
    .tips-list { display: flex; flex-direction: column; gap: .75rem; }
    .tip-item { display: flex; align-items: flex-start; gap: .75rem; }
    .tip-num {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: .125rem;
    }
    .tip-text {
      font-size: .875rem;
      color: var(--slate-600);
      line-height: 1.6;
    }

    /* Format rows */
    .format-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-radius: .75rem;
      border: 1px solid var(--slate-100);
      transition: border-color .15s;
      margin-bottom: .75rem;
    }
    .format-row:last-of-type { margin-bottom: 1.25rem; }
    .format-row:hover { border-color: var(--indigo-100); }

    .format-num {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .format-section-name {
      font-size: .9rem;
      font-weight: 700;
      color: var(--slate-900);
    }
    .format-duration {
      display: flex;
      align-items: center;
      gap: .25rem;
      font-size: .75rem;
      color: var(--slate-400);
      margin-top: .25rem;
    }
    .format-score {
      margin-left: auto;
      padding: .25rem .75rem;
      border-radius: .5rem;
      font-size: .8rem;
      font-weight: 700;
    }

    .total-score-banner {
      padding: 1rem;
      border-radius: .75rem;
      border: 2px dashed;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .total-score-label {
      font-size: .875rem;
      font-weight: 700;
      color: var(--slate-900);
    }
    .total-score-val {
      font-size: 1.1rem;
      font-weight: 800;
    }

    /* Prep resources */
    .resource-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-radius: .75rem;
      border: 1px solid var(--slate-100);
      transition: border-color .15s, background .15s;
      margin-bottom: .75rem;
    }
    .resource-row:hover { border-color: var(--indigo-100); background: rgba(238,242,255,.3); }
    .resource-row:last-child { margin-bottom: 0; }

    .resource-icon-wrap {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .resource-name {
      font-size: .875rem;
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: .25rem;
    }
    .resource-type {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: .375rem;
      background: var(--slate-100);
      color: var(--slate-500);
      font-size: .7rem;
      font-weight: 600;
    }
    .resource-link {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: .375rem;
      padding: .375rem .75rem;
      background: var(--white);
      border: 1px solid var(--slate-200);
      border-radius: .5rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--slate-500);
      transition: border-color .15s, color .15s;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
    }
    .resource-row:hover .resource-link {
      opacity: 1;
      pointer-events: auto;
    }
    .resource-link:hover { border-color: var(--indigo-400); color: var(--indigo-600); }

    /* Tips grid */
    .tips-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
    }
    @media (min-width: 640px) { .tips-grid { grid-template-columns: 1fr 1fr; } }

    .tip-card {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .75rem;
      background: var(--slate-50);
      border-radius: .75rem;
    }
    .tip-card-text {
      font-size: .8rem;
      color: var(--slate-600);
      line-height: 1.5;
    }

    /* Date rows */
    .date-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-radius: .75rem;
      border: 1px solid var(--slate-100);
      transition: border-color .15s;
      margin-bottom: .75rem;
    }
    .date-row:hover { border-color: var(--indigo-100); }
    .date-row:last-of-type { margin-bottom: 1.25rem; }

    .date-box {
      width: 3rem;
      height: 3rem;
      border-radius: .75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .date-day {
      font-size: 1.1rem;
      font-weight: 800;
    }
    .date-month {
      font-size: .6rem;
      font-weight: 600;
    }
    .date-label {
      font-size: .9rem;
      font-weight: 700;
      color: var(--slate-900);
    }
    .date-sub {
      font-size: .75rem;
      color: var(--slate-400);
      margin-top: .125rem;
    }
    .badge-upcoming {
      margin-left: auto;
      padding: .2rem .625rem;
      background: var(--green-100);
      color: var(--green-700);
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
    }

    /* Reg tip box */
    .reg-tip {
      padding: 1rem;
      border-radius: .75rem;
      background: var(--amber-50);
      border: 1px solid var(--amber-100);
      display: flex;
      align-items: flex-start;
      gap: .5rem;
    }
    .reg-tip-title {
      font-size: .875rem;
      font-weight: 700;
      color: var(--amber-800);
      margin-bottom: .25rem;
    }
    .reg-tip-text {
      font-size: .8rem;
      color: var(--amber-700);
      line-height: 1.6;
    }

    /* SVG icons inline */
    svg { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Page header ── -->
  <div class="page-header">
    <h1>International Exam Guide</h1>
    <p>Everything you need to know about IELTS, TOEFL, SAT, HSK, and TOPIK</p>
  </div>

  <div class="content-grid">

    <!-- ── LEFT PANEL ── -->
    <div class="left-panel">
      <!-- Exam selector -->
      <div class="card">
        <div class="card-label">Select Exam</div>
        <div class="exam-list" id="examList"></div>
      </div>

      <!-- Quick facts -->
      <div class="card" style="margin-top:1rem;">
        <div class="quick-facts">
          <h4>Quick Facts</h4>
          <div id="quickFacts"></div>
        </div>
      </div>
    </div>

    <!-- ── RIGHT PANEL ── -->
    <div class="right-panel">
      <!-- Exam banner -->
      <div class="exam-banner" id="examBanner">
        <div class="exam-banner-inner">
          <div class="exam-banner-emoji" id="bannerEmoji"></div>
          <div>
            <div class="exam-banner-title" id="bannerTitle"></div>
            <div class="exam-banner-sub" id="bannerSub"></div>
            <div class="exam-tags" id="bannerTags"></div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="format">Format</button>
        <button class="tab-btn" data-tab="prep">Preparation</button>
        <button class="tab-btn" data-tab="dates">Exam Dates</button>
      </div>

      <!-- Tab panes -->
      <div class="tab-pane active" id="pane-overview"></div>
      <div class="tab-pane" id="pane-format"></div>
      <div class="tab-pane" id="pane-prep"></div>
      <div class="tab-pane" id="pane-dates"></div>
    </div>

  </div>
</div>

        "Top University": "1350+",
        "Ivy League": "1500+"
      },
      format: [
        { section: "Reading & Writing (Module 1)", duration: "32 min", score: "200–800" },
        { section: "Reading & Writing (Module 2)", duration: "32 min", score: "200–800" },

        { section: "Math (Module 2)", duration: "35 min", score: "200–800" }
      ],
      prepResources: [

        { name: "College Board Official Prep", type: "Official", link: "https://www.collegeboard.org" },
        { name: "Princeton Review SAT", type: "Book", link: "https://www.princetonreview.com" }
      ],
      tips: [
        "Use Khan Academy's personalised SAT practice linked with PSAT scores.",
        "Focus on process of elimination for difficult Reading questions.",
        "Memorise key math formulas — the test provides some but not all.",

      ],
      upcomingDates: ["May 3, 2025", "Jun 7, 2025", "Aug 23, 2025", "Oct 4, 2025"]
    },
    HSK: {
      fullName: "Hànyǔ Shuǐpíng Kǎoshì (Chinese Proficiency Test)",
      color: "#b91c1c",
      bgColor: "#fff1f2",
      totalScore: "HSK 1–6 (300 pts each)",
      registrationFee: "~$30–$90 (varies by level)",
      validity: "Lifetime",
      overview: "HSK is the official Chinese government standardised test of Mandarin Chinese proficiency for non-native speakers. It has six levels (HSK 1–6) aligned with the CEFR, with HSK 6 representing near-native command of Mandarin.",
      commonRequirements: {
        "Basic Communication": "HSK 2",
        "University Admission": "HSK 4",
        "Graduate Programs": "HSK 5",
        "Fluent Proficiency": "HSK 6"
      },
      format: [
        { section: "Listening", duration: "Varies by level", score: "0–100" },
        { section: "Reading", duration: "Varies by level", score: "0–100" },
        { section: "Writing", duration: "Varies by level", score: "0–100" }
      ],
      prepResources: [
        { name: "Hanban Official HSK", type: "Official", link: "http://www.chinesetest.cn" },
        { name: "HSK Online Practice", type: "Website", link: "https://www.hskonline.com" },
        { name: "Pleco Dictionary App", type: "App", link: "https://www.pleco.com" }
      ],
      tips: [
        "Build a daily habit of writing Chinese characters by hand.",
        "Use spaced repetition apps like Anki for vocabulary retention.",

        "Start with past HSK papers to understand the exact format."
      ],
      upcomingDates: ["Apr 27, 2025", "May 25, 2025", "Jun 22, 2025", "Aug 24, 2025"]
    },
    TOPIK: {
      fullName: "Test of Proficiency in Korean",
      color: "#0369a1",
      bgColor: "#f0f9ff",
      totalScore: "TOPIK I (200) / TOPIK II (300)",
      registrationFee: "~$40–$65",
      validity: "2 years",
      overview: "TOPIK is the official Korean language proficiency exam offered by the National Institute for International Education (NIIED). It is required for admission to Korean universities and for employment in Korea. Six levels span from beginner to advanced.",
      commonRequirements: {
        "Basic Admission": "TOPIK I (Level 2)",
        "Undergraduate": "TOPIK II (Level 3)",
        "Postgraduate": "TOPIK II (Level 4)",
        "Professional Use": "TOPIK II (Level 5–6)"
      },
      format: [
        { section: "TOPIK I – Listening", duration: "40 min", score: "0–100" },
        { section: "TOPIK I – Reading", duration: "60 min", score: "0–100" },
        { section: "TOPIK II – Listening", duration: "60 min", score: "0–100" },
        { section: "TOPIK II – Writing", duration: "50 min", score: "0–100" }
      ],
      prepResources: [
        { name: "TOPIK Official Website", type: "Official", link: "https://www.topik.go.kr" },
        { name: "Talk To Me In Korean", type: "Course", link: "https://talktomeinkorean.com" },
        { name: "TOPIK GUIDE", type: "Website", link: "https://www.topikguide.com" }
      ],
      tips: [
        "Listen to Korean news and podcasts to sharpen listening skills.",
        "Practice reading Korean newspaper articles for TOPIK II Reading.",
        "Learn grammar patterns systematically by level (TOPIK 1–6).",
        "Time yourself with past papers to manage the exam pace."
      ],
      upcomingDates: ["Apr 12, 2025", "May 25, 2025", "Jul 20, 2025", "Oct 19, 2025"]
    }
  };

  const examIcons = { IELTS:"🇬🇧", TOEFL:"🇺🇸", SAT:"📐", HSK:"🇨🇳", TOPIK:"🇰🇷" };
  const examDescriptions = {
    IELTS: "English for UK, Australia & worldwide",
    TOEFL: "English for US & Canada universities",
    SAT: "US college admission test",
    HSK: "Chinese language proficiency",
    TOPIK: "Korean language proficiency"
  };
  const examList = ["IELTS","TOEFL","SAT","HSK","TOPIK"];

  let activeExam = "IELTS";

  /* ── SVG helpers ── */
  function svg(path, size=16, stroke="currentColor") {
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  }
  const icons = {
    target: svg('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'),
    clock: svg('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),
    bar: svg('<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'),
    globe: svg('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'),
    lightbulb: svg('<line x1="9" y1="21" x2="15" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M12 3a6 6 0 0 1 6 6c0 3-2 5-3 6H9c-1-1-3-3-3-6a6 6 0 0 1 6-6z"/>'),
    book: svg('<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'),
    calendar: svg('<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
    file: svg('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'),
    star: svg('<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>'),
    check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    externalLink: svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'),
    chevron: svg('<polyline points="9 18 15 12 9 6"/>'),
    dollar: svg('<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'),
  };

  /* ── Build exam list ── */
  function buildExamList() {
    const container = document.getElementById("examList");
    container.innerHTML = examList.map(key => {
      const e = exams[key];
      const active = key === activeExam;
      return `
        <button class="exam-btn${active ? " active" : ""}" onclick="selectExam('${key}')" id="btn-${key}">
          <div class="exam-icon-wrap" style="background:${e.bgColor}">${examIcons[key]}</div>
          <div>
            <div class="exam-btn-name">${key}</div>
            <div class="exam-btn-desc">${examDescriptions[key]}</div>
          </div>
          ${active ? `<span class="chevron">${icons.chevron}</span>` : ""}
        </button>`;
    }).join("");
  }

  /* ── Build quick facts ── */
  function buildQuickFacts() {
    const e = exams[activeExam];
    document.getElementById("quickFacts").innerHTML = [
      { label:"Total Score", value: e.totalScore, icon: icons.target },
      { label:"Registration Fee", value: e.registrationFee, icon: icons.dollar },
      { label:"Validity", value: e.validity, icon: icons.clock }
    ].map(({ label, value, icon }) => `
      <div class="fact-item">
        <div class="fact-icon" style="background:${e.bgColor}">
          <span style="color:${e.color}">${icon}</span>
        </div>
        <div>
          <div class="fact-label">${label}</div>
          <div class="fact-value">${value}</div>
        </div>
      </div>`).join("");
  }

  /* ── Build banner ── */
  function buildBanner() {
    const e = exams[activeExam];
    document.getElementById("examBanner").style.backgroundColor = e.bgColor;
    document.getElementById("examBanner").style.borderColor = e.color + "30";
    document.getElementById("bannerEmoji").textContent = examIcons[activeExam];
    document.getElementById("bannerTitle").textContent = activeExam;
    document.getElementById("bannerSub").textContent = e.fullName;
    document.getElementById("bannerTags").innerHTML = [
      { text: e.totalScore, colored: true },
      { text: `Valid: ${e.validity}`, colored: false },
      { text: `Fee: ${e.registrationFee}`, colored: false }
    ].map(tag => `
      <span class="exam-tag" style="color:${tag.colored ? e.color : "#475569"}">${tag.text}</span>
    `).join("");
  }

  /* ── Build overview tab ── */
  function buildOverview() {
    const e = exams[activeExam];

    // Score bar widths
    function barWidth(key, score) {
      if (activeExam === "IELTS") return Math.min((parseFloat(score)/9)*100, 100);
      if (activeExam === "TOEFL") return Math.min((parseFloat(score)/120)*100, 100);
      if (activeExam === "SAT") return Math.min((parseFloat(score.replace("+",""))/1600)*100, 100);
      return 70;
    }

    document.getElementById("pane-overview").innerHTML = `
      <div class="inner-card">
        <div class="section-title">
          <span style="color:#6366f1">${icons.globe}</span> About ${activeExam}
        </div>
        <p class="overview-text">${e.overview}</p>
      </div>

      <div class="inner-card">
        <div class="section-title">
          <span style="color:#a855f7">${icons.target}</span> Score Requirements
        </div>
        ${Object.entries(e.commonRequirements).map(([level, score]) => `
          <div class="score-row">
            <div class="score-meta">
              <span class="score-label">${level}</span>
              <span class="score-val" style="color:${e.color}">${score}</span>
            </div>
            <div class="score-bar-bg">
              <div class="score-bar-fill" style="background:${e.color};width:${barWidth(activeExam, score)}%"></div>
            </div>
          </div>`).join("")}
      </div>

      <div class="inner-card">
        <div class="section-title">
          <span style="color:#d97706">${icons.lightbulb}</span> Study Tips
        </div>
        <ul class="tips-list">
          ${e.tips.map((tip, i) => `
            <li class="tip-item">
              <div class="tip-num" style="background:${e.bgColor};color:${e.color}">${i+1}</div>
              <span class="tip-text">${tip}</span>
            </li>`).join("")}
        </ul>
      </div>`;
  }

  /* ── Build format tab ── */
  function buildFormat() {
    const e = exams[activeExam];
    document.getElementById("pane-format").innerHTML = `
      <div class="inner-card">
        <div class="section-title">
          <span style="color:#6366f1">${icons.file}</span> Test Format
        </div>
        ${e.format.map((s, i) => `
          <div class="format-row">
            <div class="format-num" style="background:${e.bgColor};color:${e.color}">${i+1}</div>
            <div>
              <div class="format-section-name">${s.section}</div>
              <div class="format-duration">${icons.clock} ${s.duration}</div>
            </div>
            <div class="format-score" style="background:${e.bgColor};color:${e.color}">${s.score}</div>
          </div>`).join("")}
        <div class="total-score-banner" style="border-color:${e.color}50;background:${e.bgColor}">
          <span style="color:${e.color}">${icons.star}</span>
          <div>
            <div class="total-score-label">Total Score</div>
            <div class="total-score-val" style="color:${e.color}">${e.totalScore}</div>
          </div>
        </div>
      </div>`;
  }

  /* ── Build prep tab ── */
  function buildPrep() {
    const e = exams[activeExam];
    document.getElementById("pane-prep").innerHTML = `
      <div class="inner-card">
        <div class="section-title">
          <span style="color:#6366f1">${icons.book}</span> Preparation Resources
        </div>
        ${e.prepResources.map(r => `
          <div class="resource-row">
            <div class="resource-icon-wrap" style="background:${e.bgColor}">
              <span style="color:${e.color}">${icons.book}</span>
            </div>
            <div>
              <div class="resource-name">${r.name}</div>
              <span class="resource-type">${r.type}</span>
            </div>
            <a class="resource-link" href="${r.link}" target="_blank" rel="noopener">
              ${icons.externalLink} Open
            </a>
          </div>`).join("")}
      </div>

      <div class="inner-card">
        <div class="section-title">
          <span style="color:#d97706">${icons.lightbulb}</span> Top Study Tips
        </div>
        <div class="tips-grid">
          ${e.tips.map(tip => `
            <div class="tip-card">
              ${icons.check}
              <p class="tip-card-text">${tip}</p>
            </div>`).join("")}
        </div>
      </div>`;
  }

  /* ── Build dates tab ── */
  function buildDates() {
    const e = exams[activeExam];
    document.getElementById("pane-dates").innerHTML = `
      <div class="inner-card">
        <div class="section-title">
          <span style="color:#ef4444">${icons.calendar}</span> Upcoming ${activeExam} Exam Dates
        </div>
        ${e.upcomingDates.map((date, i) => {
          const parts = date.split(",")[0].split(" ");
          return `
          <div class="date-row">
            <div class="date-box" style="background:${e.bgColor}">
              <span class="date-day" style="color:${e.color}">${parts[1]}</span>
              <span class="date-month" style="color:${e.color}aa">${parts[0]}</span>
            </div>
            <div>
              <div class="date-label">${date}</div>
              <div class="date-sub">${i===0 ? "Next available date" : `Exam session ${i+1}`}</div>
            </div>
            ${i===0 ? '<span class="badge-upcoming">Upcoming</span>' : ""}
          </div>`;
        }).join("")}
        <div class="reg-tip">
          <span style="color:#d97706;flex-shrink:0">${icons.lightbulb}</span>
          <div>
            <div class="reg-tip-title">Registration Tip</div>
            <p class="reg-tip-text">Register at least 4–6 weeks before your exam date to secure your preferred test centre and time slot. Fees are non-refundable after registration.</p>
          </div>
        </div>
      </div>`;
  }

  /* ── Select exam ── */
  function selectExam(key) {
    activeExam = key;
    buildExamList();
    buildQuickFacts();
    buildBanner();
    buildOverview();
    buildFormat();
    buildPrep();
    buildDates();
    // Reset to overview tab
    setTab("overview");
  }

  /* ── Tab switching ── */
  function setTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.tab === tab);
    });
    document.querySelectorAll(".tab-pane").forEach(p => {
      p.classList.toggle("active", p.id === "pane-" + tab);
    });
  }

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => setTab(btn.dataset.tab));
  });

  /* ── Init ── */
  buildExamList();
  buildQuickFacts();
  buildBanner();
  buildOverview();
  buildFormat();
  buildPrep();
  buildDates();
</script>
</body>
</html>
